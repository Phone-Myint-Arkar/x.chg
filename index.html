<!DOCTYPE html>
<html>
<head>
  <title>NexRate</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0a0a0a;
      --card:#121212;
      --border:#262626;
      --accent:#c8f135;
      --text:#fff;
      --muted:#777;
    }

    body {
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:'Syne', sans-serif;
      padding:30px;
    }

    h1 {
      font-size:42px;
      margin-bottom:25px;
      letter-spacing:-1px;
    }

    .layout {
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:24px;
    }

    .column {
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:22px;
    }

    .title {
      font-size:11px;
      letter-spacing:2px;
      color:var(--muted);
      margin-bottom:12px;
    }

    select, input {
      width:100%;
      background:#0c0c0c;
      border:1px solid var(--border);
      color:white;
      padding:12px;
      margin-bottom:10px;
      font-family:'Space Mono';
      border-radius:8px;
    }

    button {
      width:100%;
      padding:14px;
      background:var(--accent);
      border:none;
      font-weight:800;
      cursor:pointer;
      border-radius:8px;
    }

    .result, .prediction {
      font-size:26px;
      font-family:'Space Mono';
      margin-top:10px;
    }

    .decision {
      font-size:20px;
      margin-top:10px;
      font-weight:bold;
    }

    .insights, .volatility {
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
    }

    .chart-box {
      height:360px;
    }
  </style>
</head>

<body>

<h1>NexRate</h1>

<div class="layout">

  <!-- LEFT: CONVERT -->
  <div class="column">

    <div class="card">
      <div class="title">CONVERT</div>

      <select id="from"></select>
      <select id="to"></select>

      <input type="number" id="amount" value="1">

      <button onclick="convert()">Convert</button>

      <div class="result" id="result">--</div>
      <div class="insights" id="rateInfo"></div>
    </div>

  </div>

  <!-- RIGHT: ANALYSIS -->
  <div class="column">

    <!-- Prediction -->
    <div class="card">
      <div class="title">NEXT RATE</div>
      <div class="prediction" id="prediction">--</div>

      <div class="decision" id="decision">--</div>
      <div class="insights" id="insights"></div>
      <div class="volatility" id="volatility"></div>
    </div>

    <!-- Chart -->
    <div class="card chart-box">
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script>
const API = "http://127.0.0.1:5000";
let chart;

// ── Load currencies ──
async function loadCurrencies() {
  try {
    const res = await fetch(`${API}/api/rates`);
    const data = await res.json();

    const from = document.getElementById("from");
    const to = document.getElementById("to");

    from.innerHTML = "";
    to.innerHTML = "";

    data.currencies.forEach(c => {
      from.innerHTML += `<option>${c}</option>`;
      to.innerHTML += `<option>${c}</option>`;
    });

    from.value = "USD";
    to.value = "THB";

  } catch (e) {
    console.error("Error loading currencies:", e);
  }
}

// ── Convert ──
async function convert() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch(`${API}/api/convert?amount=${amount}&from=${from}&to=${to}`);
  const data = await res.json();

  document.getElementById("result").innerText = data.result + " " + to;

  loadAnalysis();
}

// ── Analysis ──
async function loadAnalysis() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  const res = await fetch(`${API}/api/predict?from=${from}&to=${to}`);
  const data = await res.json();

  const history = data.history;
  const prediction = data.prediction;

  // prediction
  document.getElementById("prediction").innerText = prediction ?? "N/A";

  // decision
  const decisionEl = document.getElementById("decision");
  decisionEl.innerText = data.decision ?? "--";

  if (data.decision === "BUY") decisionEl.style.color = "lime";
  else if (data.decision === "SELL") decisionEl.style.color = "red";
  else decisionEl.style.color = "#aaa";

  // insights + volatility
  document.getElementById("insights").innerText = data.insights;
  document.getElementById("volatility").innerText = "Risk: " + data.volatility;

  // chart
  const labels = history.map((_, i) => `D${i+1}`);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: [...labels, "TMR"],
      datasets: [
        {
          label: "Actual",
          data: history,
          borderWidth: 2
        },
        {
          label: "Prediction",
          data: [...Array(history.length-1).fill(null), prediction],
          borderDash: [5,5],
          borderWidth: 2
        }
      ]
    }
  });
}

// init
window.onload = loadCurrencies;
</script>

</body>
</html>
