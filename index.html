<!DOCTYPE html>
<html>
<head>
  <title>X.CHG Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Space+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0a0a0a;
      --card:#121212;
      --border:#262626;
      --accent:#c8f135;
      --text:#fff;
      --muted:#777;
    }

    font{
        font-family: monospace;
    }
    body {
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: 'monospace', monospace;
      padding:30px;
    }

    h1 {
      font-size:42px;
      margin-bottom:25px;
      letter-spacing:-1px;
    }

    .layout {
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:24px;
    }

    .column {
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:22px;
      transition:0.2s;
    }

    .card:hover {
      border-color:#3a3a3a;
    }

    .title {
      font-size:11px;
      letter-spacing:2px;
      color:var(--muted);
      margin-bottom:12px;
    }

    select, input {
      width:100%;
      background:#0c0c0c;
      border:1px solid var(--border);
      color:white;
      padding:12px;
      margin-bottom:10px;
      font-family:'monospace', monospace;
      border-radius:8px;
    }

    button {
      width:100%;
      padding:14px;
      background:var(--accent);
      border:none;
      font-weight:800;
      cursor:pointer;
      border-radius:8px;
    }

    button:hover {
      opacity:0.9;
    }

    .result, .prediction {
      font-size:26px;
      font-family:'Space Mono';
      margin-top:10px;
    }

    .chart-box {
      height:360px;
    }

    .subtle {
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }
  </style>
</head>

<body>

<h1>X.CHG</h1>
<p>Exchange Rate Converter & Predictor</p>

<div class="layout">

  <!-- LEFT: CONVERT -->
  <div class="column">

    <div class="card">
      <div class="title">CONVERT</div>

      <select id="from"></select>
      <select id="to"></select>

      <input type="number" id="amount" value="1">

      <button onclick="convert()">Convert</button>

      <div class="result" id="result">--</div>
      <div class="subtle" id="rateInfo"></div>
    </div>

  </div>

  <!-- RIGHT: ANALYSIS -->
  <div class="column">

    <!-- Prediction -->
    <div class="card">
      <div class="title">TOMORROW PREDICTION</div>
      <div class="prediction" id="prediction">--</div>
      <div class="subtle">Based on 7-day trend + momentum</div>
    </div>

    <!-- Chart -->
    <div class="card chart-box">
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script>
const API = "http://localhost:5000";
let chart;

// ── Load currencies ──
async function loadCurrencies() {
  const res = await fetch(`${API}/api/rates`);
  const data = await res.json();

  const from = document.getElementById("from");
  const to = document.getElementById("to");

  data.currencies.forEach(c => {
    from.innerHTML += `<option>${c}</option>`;
    to.innerHTML += `<option>${c}</option>`;
  });

  from.value = "USD";
  to.value = "THB";
}

// ── Convert ──
async function convert() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const amount = document.getElementById("amount").value;

  const res = await fetch(`${API}/api/convert?amount=${amount}&from=${from}&to=${to}`);
  const data = await res.json();

  document.getElementById("result").innerText = data.result + " " + to;

  // extra info
  document.getElementById("rateInfo").innerText =
    `1 ${from} ≈ ${(data.result / amount).toFixed(4)} ${to}`;

  loadAnalysis();
}

// ── Prediction + Chart ──
async function loadAnalysis() {
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  const res = await fetch(`${API}/api/predict?from=${from}&to=${to}`);
  const data = await res.json();

  const history = data.history;
  const prediction = data.prediction;

  document.getElementById("prediction").innerText = prediction;

  const labels = history.map((_, i) => `D${i+1}`);
  const fullData = [...history, prediction];
  const fullLabels = [...labels, "TMR"];

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: fullLabels,
      datasets: [{
        data: fullData,
        borderWidth: 2,
        tension: 0.35
      }]
    },
    options: {
      plugins: { legend: { display: false }},
      scales: {
        x: { ticks: { color: "#666" }},
        y: { ticks: { color: "#666" }}
      }
    }
  });
}

// init
loadCurrencies();
</script>

</body>
</html>
